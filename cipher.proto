syntax = "proto3";

package cipher;

option go_package = "github.com/basarardabaykal/cipherconverter-microservice/internal/pb";

service CipherService {
    rpc EncryptCaesar (CaesarRequest) returns (CipherResponse);
    rpc DecryptCaesar (CaesarRequest) returns (CipherResponse);
    
    rpc EncryptColumnar (ColumnarRequest) returns (CipherResponse);
    rpc DecryptColumnar (ColumnarRequest) returns (CipherResponse);
}

message CaesarRequest {
    bytes text = 1;
    int32 shift = 2;
}

message ColumnarRequest {
    bytes text = 1;
    int32 columns = 2;
}

message CipherResponse {
    bytes result = 1;
}